<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゆのᒼᑋªⁿ Tool Portal</title>
    <style>
        :root { --bg: #F5F5F7; --text: #2C302E; --accent: #E0B0B0; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            padding: 50px 20px; margin: 0; min-height: 100vh;
        }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 40px; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; width: 100%; max-width: 800px; 
        }
        .card { 
            background: white; padding: 30px; border-radius: 16px; 
            color: var(--text); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .card h2 { margin: 0 0 15px 0; font-size: 1.3rem; color: var(--accent); }
        .card p { font-size: 0.95rem; color: #636366; line-height: 1.6; margin-bottom: 20px; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { 
            display: block; padding: 8px; text-align: center; border-radius: 6px;
            text-decoration: none; font-size: 0.8rem; font-weight: bold;
            background: #eee; color: #555; transition: 0.2s;
        }
        /* 日本語版のみリンク有効（カーソルポインタ表示）、他は無効化 */
        .btn.jp { background: var(--accent); color: white; }
        .btn.disabled { pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>
    <h1>Yunoᒼᑋªⁿ Tool Portal</h1>
    <div class="grid">
        <!-- Magazine Card -->
        <div class="card">
            <h2>Magazine Card Generator</h2>
            <p>マガジン風のキャラクターカードを作成します。</p>
            <div class="button-group">
                <a href="./ynmagcard/" class="btn jp">日本語版</a>
                <a href="#" class="btn disabled">English Ver</a>
                <a href="#" class="btn disabled">한국어 Ver</a>
                <a href="#" class="btn disabled">中文版</a>
            </div>
        </div>
        <!-- Profile Card -->
        <div class="card">
            <h2>Profile Card Generator</h2>
            <p>シンプルで見やすいキャラクターカードを作成します。</p>
            <div class="button-group">
                <a href="./ynprofcard/" class="btn jp">日本語版</a>
                <a href="#" class="btn disabled">English Ver</a>
                <a href="#" class="btn disabled">한국어 Ver</a>
                <a href="#" class="btn disabled">中文版</a>
            </div>
        </div>
    </div>
</body>
</html>
